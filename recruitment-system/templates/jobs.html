<!DOCTYPE html>
<html>
<head>
    <title>Available Jobs</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .job-card {
            width: 300px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .job-card:hover {
            transform: scale(1.05);
        }

        .apply-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #00ffcc;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .apply-btn:hover {
            background: #00cc99;
        }
    </style>
</head>

<body>

<h1>Available Jobs</h1>

<div class="container">

{% for job in jobs %}

<div class="job-card">
    <h2>{{ job[1] }}</h2>
    <h4>{{ job[2] }}</h4>
    <p>{{ job[3] }}</p>

    <a href="/apply/{{ job[0] }}" class="apply-btn">Apply Now</a>
</div>

{% endfor %}

</div>

</body>
</html>
